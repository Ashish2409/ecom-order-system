name: CodeQL Security Scan

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 1'   # Weekly Monday 2 AM UTC

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      actions: read
      contents: read
      security-events: write    # ⭐ needed to upload results to Security tab

    strategy:
      fail-fast: false
      matrix:
        language: [ 'java' ]
        # Add 'javascript' if you have a frontend later

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # ─── Initialize CodeQL ───
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended, security-and-quality
          # security-extended: deeper security analysis
          # security-and-quality: adds code quality checks

      # ─── Build ALL services for scanning ───
      - name: Build all services
        run: |
          for service in user-service product-service order-service cart-service notification-service api-gateway; do
            if [ -d "$service" ]; then
              echo "Building $service"
              cd $service
              chmod +x gradlew
              ./gradlew clean build -x test --no-daemon
              cd ..
            fi
          done

      # ─── Run analysis ───
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: always    # upload results even on failure