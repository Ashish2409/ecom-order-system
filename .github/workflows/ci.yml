name: CI - Build

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Detect which services changed
  # ─────────────────────────────────────────────
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
      any-service-changed: ${{ steps.filter.outputs.any-service-changed }}
    steps:
      - uses: actions/checkout@v4

      - name: Filter changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            user-service:
              - 'user-service/**'
            product-service:
              - 'product-service/**'
            order-service:
              - 'order-service/**'
            cart-service:
              - 'cart-service/**'
            notification-service:
              - 'notification-service/**'
            api-gateway:
              - 'api-gateway/**'
            any-service-changed:
              - 'user-service/**'
              - 'product-service/**'
              - 'order-service/**'
              - 'cart-service/**'
              - 'notification-service/**'
              - 'api-gateway/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle/**'

  # ─────────────────────────────────────────────
  # Build changed services (uses ROOT gradlew)
  # ─────────────────────────────────────────────
  build:
    name: Build (${{ matrix.service }})
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Verify Gradle project structure
        run: |
          echo "=== Root files ==="
          ls -la
          echo ""
          echo "=== Gradle projects ==="
          ./gradlew projects --no-daemon || echo "Projects listing failed"

      - name: Build ${{ matrix.service }}
        env:
          SPRING_PROFILES_ACTIVE: test
          JWT_SECRET: testSecretMustBeAtLeast32CharactersLongForHS256!
          JWT_EXPIRATION: 3600000
        run: |
          # Build only the changed service from root
          ./gradlew :${{ matrix.service }}:build -x test --no-daemon

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: jar-${{ matrix.service }}
          path: ${{ matrix.service }}/build/libs/*.jar
          retention-days: 7
          if-no-files-found: warn

  # ─────────────────────────────────────────────
  # Aggregate success check for branch protection
  # ─────────────────────────────────────────────
  ci-success:
    name: CI Success
    needs: [ detect-changes, build ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify build status
        run: |
          echo "Detect result: ${{ needs.detect-changes.result }}"
          echo "Build result: ${{ needs.build.result }}"
          
          if [ "${{ needs.detect-changes.result }}" != "success" ]; then
            echo "❌ Change detection failed"
            exit 1
          fi
          
          if [ "${{ needs.build.result }}" = "failure" ]; then
            echo "❌ Build failed"
            exit 1
          fi
          
          echo "✅ All checks passed (or skipped - no service changes)"