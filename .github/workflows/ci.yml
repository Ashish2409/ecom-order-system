name: CI - Build & Test

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

# Cancel outdated runs on same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Detect which services changed (smart builds)
  # ─────────────────────────────────────────────
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - name: Filter changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            user-service:
              - 'user-service/**'
            product-service:
              - 'product-service/**'
            order-service:
              - 'order-service/**'
            cart-service:
              - 'cart-service/**'
            notification-service:
              - 'notification-service/**'
            api-gateway:
              - 'api-gateway/**'

  # ─────────────────────────────────────────────
  # Build + Test changed services in parallel
  # ─────────────────────────────────────────────
  build-test:
    name: Build & Test (${{ matrix.service }})
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        working-directory: ${{ matrix.service }}
        run: chmod +x gradlew

      - name: Build ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        env:
          SPRING_PROFILES_ACTIVE: test
          DB_URL: jdbc:postgresql://localhost:5432/testdb
          DB_USER: test
          DB_PASSWORD: test
          JWT_SECRET: testSecretMustBeAtLeast32CharactersLongForHS256!
          JWT_EXPIRATION: 3600000
        run: ./gradlew clean build --no-daemon

      - name: Run tests
        working-directory: ${{ matrix.service }}
        env:
          SPRING_PROFILES_ACTIVE: test
          DB_URL: jdbc:postgresql://localhost:5432/testdb
          DB_USER: test
          DB_PASSWORD: test
          JWT_SECRET: testSecretMustBeAtLeast32CharactersLongForHS256!
        run: ./gradlew test --no-daemon

      - name: Generate test report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          name: Test Report - ${{ matrix.service }}
          path: '${{ matrix.service }}/build/test-results/test/*.xml'
          require_tests: false
          fail-on-error: false

      - name: Generate JaCoCo coverage report
        working-directory: ${{ matrix.service }}
        run: ./gradlew jacocoTestReport --no-daemon || echo "JaCoCo not configured yet"

      - name: Upload coverage to artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/build/reports/jacoco/test/html/
          retention-days: 7

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar-${{ matrix.service }}
          path: ${{ matrix.service }}/build/libs/*.jar
          retention-days: 7

  # ─────────────────────────────────────────────
  # Overall status check (required for branch protection)
  # ─────────────────────────────────────────────
  ci-success:
    name: CI Success
    needs: build-test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          if [ "${{ needs.build-test.result }}" != "success" ] && [ "${{ needs.build-test.result }}" != "skipped" ]; then
            echo "❌ Build failed"
            exit 1
          fi
          echo "✅ All checks passed"