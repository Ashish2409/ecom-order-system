name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build all services
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: ./gradlew build -x test --no-daemon

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push order-service
        uses: docker/build-push-action@v5
        with:
          context: ./order-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ecom-order-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ecom-order-service:${{ github.sha }}

      - name: Build & push user-service
        uses: docker/build-push-action@v5
        with:
          context: ./user-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ecom-user-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ecom-user-service:${{ github.sha }}

      - name: Build & push product-service
        uses: docker/build-push-action@v5
        with:
          context: ./product-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ecom-product-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ecom-product-service:${{ github.sha }}

      - name: Deploy to AWS EC2
        if: success()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/ecom-order-system
            docker-compose pull
            docker-compose up -d
            docker system prune -f