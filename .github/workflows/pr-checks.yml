name: PR Quality Checks

on:
  pull_request:
    types: [ opened, synchronize, reopened, edited ]

permissions:
  contents: read
  pull-requests: write
  issues: write
  statuses: write

jobs:
  # ─────────────────────────────────────────────
  # Validate PR title follows conventional commits
  # ─────────────────────────────────────────────
  pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false

  # ─────────────────────────────────────────────
  # Label PR by size
  # ─────────────────────────────────────────────
  pr-size:
    name: Check PR Size
    runs-on: ubuntu-latest
    steps:
      - uses: codelytv/pr-size-labeler@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          xs_label: 'size/xs'
          s_label: 'size/s'
          m_label: 'size/m'
          l_label: 'size/l'
          xl_label: 'size/xl'
          fail_if_xl: false

  # ─────────────────────────────────────────────
  # Secret scanning
  # ─────────────────────────────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}